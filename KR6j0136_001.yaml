body:
  text: 舊名阿迦𮓌㗚婆𮗿弘新名薩縛娑底迦吉祥頂輪王大曼荼羅灌頂儀并金剛界衆形色東都聖善寺沙門吉祥集內院三昧耶界道中台院中畫佛世尊坐師子座其座種種寶莊嚴聖者身坐白蓮華身白金色入最勝三摩地王相結跏趺坐作説法相從一切身普遍出十二幅金輪熾盛光明如輪圍繞從頂流出種種光明青黃赤白具大仗夫相倚菩提樹其樹有種種葉如真多摩尼樹形於上繫種種繒綵或繫吠琉璃寶天果妙衣或垂雲降雨有種種芽吉祥衆鳥並坐其上或於枝間種種寶葉已成劫樹世尊兩肩後倚著其樹佛右邊座下畫轉輪王形坐白蓮華作觀佛勢其身金色周遍光明七寶成就惟輪寶以光圍繞在蓮華上餘六寶如次安之東南角摧碎佛頂南勝佛頂西南角無邊聲佛頂西白傘蓋佛頂西北角高廣佛頂北光聚佛頂坐白蓮花上種種光圍繞在熾光明中坐身金色手持真多摩尼寶東北角最勝佛頂正東高佛頂如大王形坐白蓮花上手持俱緣果睹輪王勢已上中院十佛頂名號次第二院獨古杵界道從東北角起首畫向南也東南角法波羅蜜菩薩次大勢至觀音菩薩葉衣觀音菩薩多羅觀音菩薩種種嚴具莊著輕衣其身形不麁不細中庸形右手持青蓮花左手施願坐花台上作淺緑色也觀世音菩薩毗俱胝觀音菩薩身白色三目四臂右上手持仗左上手持瓶右下手持念珠左下手持蓮花身儀寂靜白衣觀音菩薩以蓮花鬘莊嚴身用寶繒角絡被右手持真多摩尼寶左手施願坐蓮花上此是一切蓮花族母觀自在王菩薩坐寶蓮花上合掌作禮勢西南角羯磨波羅蜜菩薩次禪波羅蜜菩薩結定即身如金忍波羅蜜菩薩施波羅蜜菩薩虛空明妃如天形坐蓮花上合掌作禮勢戒波羅蜜菩薩精進波羅蜜菩薩惠波羅蜜菩薩西北角金剛波羅蜜菩薩次降三世金剛菩薩身相如瑜伽金剛將明妃金剛將童子如名別無相金剛手菩薩右手持白拂左手持金剛杵坐蓮花上金剛母菩薩名摩莫枳身相如童女淡紫青色種種瓔珞莊嚴坐蓮花上住般若自性右手持梵夾左手持真多摩尼施願勢不得高顏悅意是金剛族母蘇婆呼童子菩薩作童子形頂行童子菩薩同前準被髮相東北角寶波羅蜜菩薩次般若波羅蜜菩薩慈氏菩薩手執白拂佛慈菩薩佛眼菩薩形如天女坐寶蓮花種種莊嚴身如金色目觀衆會著輕穀衣角被右手持寶左手施願圓光周遍身相寂佛豪相菩薩形如天母色相同前唯右手持蓮花左手施願光明同前無異文殊菩薩身相金色如意寶菩薩已上第二院三十二聖者名次第三院同第二界道東南角歌供養菩薩形服皆金色次如意輪菩薩才發心轉法輪菩薩八聖觀音菩薩蓮華吉祥菩薩蓮華孫陀利菩薩四臂右第一手持羂索左手持鉞斧右第二手施願左第二手持果坐於蓮花光明同前青頸觀音菩薩蓮華髻菩薩蓮華藥叉菩薩十一面觀音菩薩西南角舞供養菩薩形服皆金色次嚩哩迦龍王嚩哩迦七頭阿難陀龍王此上二龍王曾見佛有七頭合掌跪地即上嚩哩迦阿難陀也唯持花鬘有異也無染河天者即尼蓮河神也並見佛來身相如目止鄰龍王更無別狀地天供養身白色以二手捧寶花籠子二膝跪地無能勝姤菩薩無能勝妃無熱惱龍王持蓮花鬘曲躬合掌目真鱗龍王并前二龍王青色黑色如女形七頭合掌作禮勢前後同龍女相端嚴西北角獻喜菩薩形服皆金色次烏芻瑟摩金剛金剛藏菩薩甘露軍吒利菩薩金剛孫陀利菩薩此是明妃形如天女種種瓔珞莊嚴其身青色手執蓮花坐寶山上金剛愛菩薩金剛拳菩薩施無畏菩薩鉢拏攝末里菩薩金剛針菩薩東北角鬘供養菩薩形服皆金色談無竭菩薩陀羅尼自在菩薩摩麼雞菩薩坐蓮花臺如女形首戴寶冠左手執五古杵右手施願身相端嚴圓光熾盛也大惠菩薩身如作禮勢合掌坐蓮臺金色具端嚴寂靜菩薩同前大惠相無垢惠菩薩同前寂靜相虛空無垢菩薩同前無垢惠海惠菩薩善象猛菩薩已上第三院四十聖名號金剛界外第四院辦事天等次第外供養從東南角燈供養菩薩二手捧燈臺身形衣服並赤次火天姤焰魔天王當門金剛鈴菩薩形服並緑色搖鈴居本門次焰魔王姤羅剎天主西南角塗香菩薩衣服身形黃色次羅剎主姤毗沙門天王當門金剛鉤菩薩形服青執鉤在本位次毗沙門天姤風天主西北角香供養菩薩黑色二手執香爐風天姤水天王當門金剛索菩薩形服並黃執索當門位水天姤伊舍那天東北角花供養菩薩坐白蓮花衣服面色具白二手持花供養勢也伊舍那天姤帝釋天王當門金剛鎖菩薩形服並赤持鎖本位中帝釋姤火天主已上第四院二十天名號從此第五食道院四角畫五古杵契焰鬘威相成已上曼荼羅輪王大灌頂儀軌中上壇聖者都計一百二十二尊號阿闍梨與弟子灌頂應於大曼荼羅側對聖衆面前別塗作曼荼羅以白粉參肘量普於中畫蓮花中台上畫師子座令灌頂弟子𬅈花了者坐上令一解法弟子持蓋及拂誦吉慶聲讚徐徐不絶取中瓶水加持一百八遍教弟子結佛頂印安於頂上餘如灌頂儀中廣説然須吹蠡擊鼓作諸音樂等我今依經説輪王畫像法近人具衆流作法方可為如經廣稱述白疊須頓方五肘或三肘畫聖者像先從大海踊出須彌山王四寶所成先北金東白銀南吠琉璃色青色西頗胝迦寶色紅色於山上坐白蓮華身白金色正受入最勝王三摩地結跏趺坐從一切身遍滿流出十二幅金輪熾盛光明於上應畫山峯其峯以種種寶成聖者從頂流出種種光明青黃赤白旋轉自在聖者右邊畫持誦人手執香爐觀如來面下應畫蓮花池餘如經説也畫二大明王相如後説尊儀賀野仡哩二合嚩大明王身如火色忿怒形鼻如猿猴以蛇莊嚴瓔珞臂釧膊釧頭繫蓮華鬘作瞻睹勢次無能勝忿怒王身白色四臂頻眉面嗔虎皮為裙蟒蛇為耳璫得叉迦龍王以為腰縚婆蘇枳龍王以為神線角絡被耽肚身形稍短以毒蛇莊嚴髻冠口咬下唇遍身火焰熾盛圓光右上手持金剛杵右下手作期尅勢左上手持三古戟叉左下手執鉞斧正面作阿吒吒賀娑勢從口火焰種種色相右邊面作觀瞻勢左邊面下看也頭上面作觀大衆勢於寶蓮華立也了已上二聖者於曼荼羅門外兩邊畫次觀本尊五支也阿尾囉吽欠亦云闕寶量不空毗盧居頂後餘從額配之阿字金剛寶地大悲地界所執持故微字功德乳海所資𨳝故囉字三昧惠炬所溫育故吽字除障智風所開發故欠字無邊性空不障礙故五支先布已次説瑜伽相阿字真金色普現金剛輪加持於下體説名瑜伽座微字素月光匪於霧聚中加持於齊上是名大悲海囉字初日暉形赤在三角加持於心位稱為智火威吽字劫火焰塗玄若風輪加持白毫際名為自在力欠字由大空含容一切色加持於頂上故號無等人次五支從地水火風空配成及壇阿字想座下金剛座已成色相如黃金即戒義也其壇相方曼荼囉亦耳微字想於臍色白慈悲水即定義也其壇相圓外壇如滿月囉字想於心其相色赤紅為惠義也其壇三角形外壇亦三角吽字想眉間色黑為無礙風即解脫義也其壇想青形如半月外壇相亦同欠字安頂上以成大空點即解脫知見義也其壇如字義空點無色相能成諸事業即是陀羅尼義也唵引速乞灑二合摩嚩日囉二合此云細細如金剛此陀羅尼能令所觀成就唵引底丁以反瑟姹二合嚩日囉二合此云不動如金剛此陀羅尼能令所觀無失唵引薩頗二合囉拏嚩日囉二合此云周遍如金剛此陀羅尼能令所觀漸廣量周法界唵引僧賀囉二合嚩日囉二合此云了達如金剛此陀羅尼能令所觀漸略猶如毫端住白毫際或住鼻端隨心所樂次説畫蘇婆呼童子身形眷屬尊身如童子形金色如名號悚栗畫尊儀七曜圍繞密莫雲漠𠼬嗢沒斯那纈雞各如本形畫住賀野仡哩嚩明側立花上次畫頂行童子身形眷屬尊身金色髻髮下垂左手持金剛杵右手叉腰八頻那夜迦圍繞所為金剛莊嚴金剛塵金剛索金剛鉞斧金剛極笑金剛成莊嚴金剛頂金剛頻那夜釰器仗如文配已上並是頂輪壇法具足寫了書本云天喜元年五月一日書了一交了僧賴昭以天台實嚴僧正持本交合之東寺沙門道快朱筆此軌者𮗿弘和尚集歟辨𮗿兩字通用之間青龍和尚門人制作尤以可為規模者也
